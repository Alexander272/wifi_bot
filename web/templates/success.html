<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico">
  <title>Подключено</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #042e60 0%, #021a33 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 48px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #042e60;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon svg {
      width: 40px;
      height: 40px;
      stroke: #fff;
    }

    h1 {
      font-size: 24px;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    p {
      font-size: 15px;
      color: #6c757d;
      line-height: 1.6;
    }

    .details {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin: 24px 0 0;
      text-align: left;
    }

    .details dt {
      font-size: 12px;
      color: #adb5bd;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .details dd {
      font-size: 14px;
      color: #212529;
      font-weight: 600;
      margin: 2px 0 12px;
    }

    .details dd:last-child {
      margin-bottom: 0;
    }

    .spinner {
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 13px;
      color: #adb5bd;
    }

    .spinner-icon {
      width: 16px;
      height: 16px;
      border: 2px solid #e0e0e0;
      border-top-color: #042e60;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>
    <h1>Вы подключены!</h1>
    <p>Доступ в интернет активирован. Можете закрыть эту страницу.</p>

    <dl class="details">
      <dt>MAC-адрес</dt>
      <dd>{{.Mac}}</dd>
      <dt>IP-адрес</dt>
      <dd>{{.IP}}</dd>
    </dl>

    <div class="spinner">
      <div class="spinner-icon"></div>
      Закрытие через <span id="counter">10</span> секунд...
    </div>
  </div>

  <script>
    let seconds = 10;
    const el = document.getElementById('counter');
    const interval = setInterval(function () {
      seconds--;
      el.textContent = seconds;
      if (seconds <= 0) { clearInterval(interval); window.close(); }
    }, 1000);
  </script>
</body>

</html>
