<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico">
  <title>Wi-Fi авторизация</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #042e60 0%, #021a33 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-banner {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e0e0e0;
    }

    .logo-banner img {
      max-width: 250px;
      height: auto;
    }

    .logo svg {
      width: 64px;
      height: 64px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-top: 12px;
    }

    .logo p {
      font-size: 14px;
      color: #6c757d;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #495057;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 8px;
      text-align: center;
      text-transform: uppercase;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #042e60;
      box-shadow: 0 0 0 3px rgba(4, 46, 96, 0.15);
    }

    .form-group input::placeholder {
      font-size: 14px;
      font-weight: 400;
      color: #adb5bd;
      letter-spacing: 8px;
      font-size: 24px;
      font-weight: 700;
    }

    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #042e60;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      background: #053b7a;
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(4, 46, 96, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    .btn.loading .spinner {
      display: inline-block;
    }

    .btn .btn-text {
      display: inline;
    }

    .btn.loading .btn-text {
      display: none;
    }

    .btn .btn-loading-text {
      display: none;
    }

    .btn.loading .btn-loading-text {
      display: inline;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error {
      background: #fff5f5;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
      color: #dc2626;
      font-size: 14px;
      line-height: 1.5;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #2e4154;
    }

    .footer a {
      color: #042e60;
      text-decoration: none;
      font-weight: 600;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo-banner">
      <img src="/static/logo.webp" alt="Logo">
    </div>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#042e60" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M5 12.55a11 11 0 0 1 14.08 0" />
        <path d="M1.42 9a16 16 0 0 1 21.16 0" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
      <h1>Корпоративный Wi-Fi</h1>
      <p>Введите код из Mattermost для доступа в сеть</p>
    </div>

    {{if .Error}}
    <div class="error">{{.Error}}</div>
    {{end}}

    <form action="/portal/login" method="POST">
      <input type="hidden" name="mac" value="{{.Mac}}">
      <input type="hidden" name="ip" value="{{.IP}}">
      <input type="hidden" name="link_login_only" value="{{.LinkLoginOnly}}">
      <input type="hidden" name="challenge" value="{{.Challenge}}">
      <input type="hidden" name="link_orig" value="{{.LinkOrig}}">

      <div class="form-group">
        <label for="code">Код доступа</label>
        <input type="text" id="code" name="code" placeholder="X8F2K3" maxlength="6" autocomplete="off" autocorrect="off"
          autocapitalize="characters" spellcheck="false" required autofocus>
      </div>

      <button type="submit" class="btn" id="submitBtn">
        <span class="spinner"></span>
        <span class="btn-text">Подключиться</span>
        <span class="btn-loading-text">Подключаемся...</span>
      </button>
    </form>

    <div class="footer">
      Нет кода? <a href="{{.DeepLink | safeURL}}" target="_blank">напишите "wifi" боту в Mattermost</a>
    </div>
  </div>

  <script>
    document.getElementById('code').addEventListener('input', function (e) {
      this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    });

    document.querySelector('form').addEventListener('submit', function () {
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.classList.add('loading');
    });
  </script>
</body>

</html>
