environment: 'dev'
log_level: debug
log_source: false

http:
    host: '127.0.0.1'
    port: '80'
    read_timeout: 10s
    write_timeout: 15s
    max_header_bytes: 1

redis:
    db: 0
    host: pro.sealur.ru
    port: 6379

postgres:
    host: '127.0.0.1'
    port: '5436'
    username: postgres
    db_name: wifi_bot
    ssl_mode: disable

mikrotik:
    api_version: 'v7'
    host: '192.168.5.250'
    api_port: 80
    use_ssl: false
    # auth_method: mac_binding
    auth_method: chap
    auth_timeout: 10s
    collect_interval: 30s
    allow_reuse: false

mattermost:
    code_ttl: 8h
    bot_username: pro_errors_bot
    team_name: Служба IT
    admin_ids: []
